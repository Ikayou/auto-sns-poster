name: Daily TikTok Draft Upload

on:
  schedule:
    # 毎日ドイツ時間 朝7時 (UTC 朝5時) に定期実行
    - cron: '0 5 * * *'
  workflow_dispatch: # GitHubの画面から好きな時に「手動テスト実行」できるボタン

jobs:
  upload-draft-video:
    runs-on: ubuntu-latest # GitHubが用意する最新のLinuxサーバーを使用

    steps:
    - name: 📂 リポジトリのコードを取得
      uses: actions/checkout@v4

    - name: 🐍 Pythonのセットアップ
      uses: actions/setup-python@v5
      with:
        python-version: '3.12' # ご自身の環境に合わせる

    - name: 🛠️ システム依存関係のインストール (ImageMagick & 日本語フォント)
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick fonts-noto-cjk
        # ImageMagickのセキュリティ制限を解除
        sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"//' /etc/ImageMagick-*/policy.xml

    - name: 📦 Pythonライブラリのインストール
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: 🚀 カルーセル動画を生成してTikTok下書きへ送信
      env: # GitHubの金庫から鍵を取り出して、環境変数としてセットする
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
        TIKTOK_ACCOUNT_NAME: ${{ secrets.TIKTOK_ACCOUNT_NAME }}
      run: |
        # 1. heise.deニュース取得 → AI生成 → PlaywrightでスライドPNG生成
        python app/create_carousel.py

        # 2. スライドPNGを1本のMP4へ変換
        python app/slides_to_video.py

        # 3. TikTokアプリのInboxへ送信（アプリで音楽を選んで投稿）
        python app/upload_to_tiktok_draft.py
