name: Daily TikTok Draft Upload

on:
  schedule:
    # GitHub Actions cron runs in UTC.
    # Fixed UTC times to avoid schedule-check skips.
    # Berlin local time shifts by one hour between CET and CEST.
    - cron: '30 7 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  upload-draft-video:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick fonts-noto-cjk
        sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"//' /etc/ImageMagick-*/policy.xml

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Create video and send to TikTok draft flow
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
        TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
        TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
        TIKTOK_ACCOUNT_NAME: ${{ secrets.TIKTOK_ACCOUNT_NAME }}
      run: |
        if [ -z "$OPENAI_API_KEY" ]; then
          echo "OPENAI_API_KEY GitHub secret is missing."
          exit 1
        fi
        if [ -z "$TIKTOK_REFRESH_TOKEN" ]; then
          echo "TIKTOK_REFRESH_TOKEN GitHub secret is missing."
          exit 1
        fi
        if [ -z "$TIKTOK_CLIENT_KEY" ]; then
          echo "TIKTOK_CLIENT_KEY GitHub secret is missing."
          exit 1
        fi
        if [ -z "$TIKTOK_CLIENT_SECRET" ]; then
          echo "TIKTOK_CLIENT_SECRET GitHub secret is missing."
          exit 1
        fi
        if [ -z "$TIKTOK_ACCOUNT_NAME" ]; then
          echo "TIKTOK_ACCOUNT_NAME GitHub secret is missing."
          exit 1
        fi

        python app/agent_runner.py
