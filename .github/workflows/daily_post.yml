name: Daily SNS Upload

on:
  schedule:
    # GitHub Actions cron runs in UTC.
    # Fixed UTC times to avoid schedule-check skips.
    # Berlin local time shifts by one hour between CET and CEST.
    - cron: '30 7 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  upload-draft-video:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick fonts-noto-cjk
        sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"//' /etc/ImageMagick-*/policy.xml

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Create video and send to SNS flows
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
        TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
        TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
        TIKTOK_ACCOUNT_NAME: ${{ secrets.TIKTOK_ACCOUNT_NAME }}
        UPLOAD_TO_INSTAGRAM: ${{ vars.UPLOAD_TO_INSTAGRAM }}
        INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
        INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
        INSTAGRAM_API_VERSION: ${{ vars.INSTAGRAM_API_VERSION }}
        INSTAGRAM_GRAPH_HOST: ${{ vars.INSTAGRAM_GRAPH_HOST }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_SLIDES_REPO: ${{ secrets.GITHUB_SLIDES_REPO }}
        GITHUB_SLIDES_DIR: ${{ runner.temp }}/auto-sns-slides
        GITHUB_SLIDES_BRANCH: ${{ vars.GITHUB_SLIDES_BRANCH }}
        GITHUB_PAGES_BASE_URL: ${{ vars.GITHUB_PAGES_BASE_URL }}
      run: |
        if [ -z "$OPENAI_API_KEY" ]; then
          echo "OPENAI_API_KEY GitHub secret is missing."
          exit 1
        fi
        if [ -z "$TIKTOK_REFRESH_TOKEN" ]; then
          echo "TIKTOK_REFRESH_TOKEN GitHub secret is missing."
          exit 1
        fi
        if [ -z "$TIKTOK_CLIENT_KEY" ]; then
          echo "TIKTOK_CLIENT_KEY GitHub secret is missing."
          exit 1
        fi
        if [ -z "$TIKTOK_CLIENT_SECRET" ]; then
          echo "TIKTOK_CLIENT_SECRET GitHub secret is missing."
          exit 1
        fi
        if [ -z "$TIKTOK_ACCOUNT_NAME" ]; then
          echo "TIKTOK_ACCOUNT_NAME GitHub secret is missing."
          exit 1
        fi
        case "$UPLOAD_TO_INSTAGRAM" in
          1|true|TRUE|yes|YES|on|ON)
            if [ -z "$INSTAGRAM_ACCESS_TOKEN" ]; then
              echo "INSTAGRAM_ACCESS_TOKEN GitHub secret is missing."
              exit 1
            fi
            if [ -z "$INSTAGRAM_USER_ID" ] && [ -z "$INSTAGRAM_BUSINESS_ACCOUNT_ID" ]; then
              echo "INSTAGRAM_USER_ID or INSTAGRAM_BUSINESS_ACCOUNT_ID GitHub secret is missing."
              exit 1
            fi
            if [ -z "$GITHUB_SLIDES_REPO" ]; then
              echo "GITHUB_SLIDES_REPO secret is missing."
              exit 1
            fi
            if [ -z "$GITHUB_PAGES_BASE_URL" ]; then
              echo "GITHUB_PAGES_BASE_URL GitHub variable is missing."
              exit 1
            fi
            ;;
        esac

        python app/agent_runner.py
