name: Daily TikTok Post

on:
  schedule:
    # 毎日ドイツ時間 朝7時 (UTC 朝5時) に定期実行
    - cron: '0 5 * * *'
  workflow_dispatch: # GitHubの画面から好きな時に「手動テスト実行」できるボタン

jobs:
  post-video:
    runs-on: ubuntu-latest # GitHubが用意する最新のLinuxサーバーを使用

    steps:
    - name: 📂 リポジトリのコードを取得
      uses: actions/checkout@v4

    - name: 🐍 Pythonのセットアップ
      uses: actions/setup-python@v5
      with:
        python-version: '3.12' # ご自身の環境に合わせる

    - name: 🛠️ システム依存関係のインストール (ImageMagick & 日本語フォント)
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick fonts-noto-cjk
        # ImageMagickのセキュリティ制限を解除
        sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"//' /etc/ImageMagick-*/policy.xml

    - name: 📦 Pythonライブラリのインストール
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🚀 自動生成＆投稿スクリプトの実行
      env: # GitHubの金庫から鍵を取り出して、環境変数としてセットする
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        CLIENT_KEY: ${{ secrets.CLIENT_KEY }}
        CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
        CODE: ${{ secrets.CODE }}
      run: |
        # 1. ニュースを取得して動画を生成
        python app/create_news_video.py
        
        # 2. 完成した動画を引数で指定して投稿スクリプトに渡す
        python app/post_to_tiktok.py tiktok_news.mp4 "ドイツの最新テックニュースをお届け！🇩🇪🤖 #IT #エンジニア #ニュース"