name: Daily TikTok Draft Upload

on:
  schedule:
    # GitHub Actions cron runs in UTC.
    # These four UTC times cover the start of the Berlin windows
    # 08:30-09:00 and 17:00-17:30 in Europe/Berlin
    # across both summer time (CEST) and winter time (CET).
    - cron: '30 6 * * *'
    - cron: '30 7 * * *'
    - cron: '0 15 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  upload-draft-video:
    runs-on: ubuntu-latest

    steps:
    - name: Check Berlin schedule
      id: schedule_check
      run: |
        berlin_time="$(TZ=Europe/Berlin date +'%H:%M')"
        berlin_hour="$(TZ=Europe/Berlin date +'%H')"
        berlin_minute="$(TZ=Europe/Berlin date +'%M')"
        berlin_minutes=$((10#$berlin_hour * 60 + 10#$berlin_minute))
        morning_start=$((8 * 60 + 30))
        morning_end=$((9 * 60))
        evening_start=$((17 * 60))
        evening_end=$((17 * 60 + 30))

        echo "Berlin time: ${berlin_time}"

        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "run_job=true" >> "$GITHUB_OUTPUT"
        elif { [ "$berlin_minutes" -ge "$morning_start" ] && [ "$berlin_minutes" -le "$morning_end" ]; } || { [ "$berlin_minutes" -ge "$evening_start" ] && [ "$berlin_minutes" -le "$evening_end" ]; }; then
          echo "run_job=true" >> "$GITHUB_OUTPUT"
        else
          echo "run_job=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Checkout repository
      if: steps.schedule_check.outputs.run_job == 'true'
      uses: actions/checkout@v4

    - name: Set up Python
      if: steps.schedule_check.outputs.run_job == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install system dependencies
      if: steps.schedule_check.outputs.run_job == 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick fonts-noto-cjk
        sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"//' /etc/ImageMagick-*/policy.xml

    - name: Install Python dependencies
      if: steps.schedule_check.outputs.run_job == 'true'
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Create video and send to TikTok draft flow
      if: steps.schedule_check.outputs.run_job == 'true'
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
        TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
        TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
        TIKTOK_ACCOUNT_NAME: ${{ secrets.TIKTOK_ACCOUNT_NAME }}
      run: |
        if [ -z "$OPENAI_API_KEY" ]; then
          echo "OPENAI_API_KEY GitHub secret is missing."
          exit 1
        fi
        if [ -z "$TIKTOK_REFRESH_TOKEN" ]; then
          echo "TIKTOK_REFRESH_TOKEN GitHub secret is missing."
          exit 1
        fi
        if [ -z "$TIKTOK_CLIENT_KEY" ]; then
          echo "TIKTOK_CLIENT_KEY GitHub secret is missing."
          exit 1
        fi
        if [ -z "$TIKTOK_CLIENT_SECRET" ]; then
          echo "TIKTOK_CLIENT_SECRET GitHub secret is missing."
          exit 1
        fi
        if [ -z "$TIKTOK_ACCOUNT_NAME" ]; then
          echo "TIKTOK_ACCOUNT_NAME GitHub secret is missing."
          exit 1
        fi

        python app/create_carousel.py
        python app/slides_to_video.py
        python app/upload_to_tiktok_draft.py
