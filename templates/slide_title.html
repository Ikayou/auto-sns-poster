<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'NotoSansJP';
    src: url('data:font/truetype;base64,{{FONT_B64}}') format('truetype');
    font-weight: 900;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    background: linear-gradient(160deg, #1a1a2e 0%, #16213e 55%, #0f3460 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'NotoSansJP', 'Noto Sans JP', sans-serif;
    color: white;
    overflow: hidden;
    position: relative;
  }
  .deco-circle {
    position: absolute;
    border-radius: 50%;
    background: #e94560;
  }
  .deco-1 { width: 700px; height: 700px; top: -280px; right: -280px; opacity: 0.06; }
  .deco-2 { width: 450px; height: 450px; bottom: -150px; left: -150px; opacity: 0.05; }
  .deco-line {
    position: absolute;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, transparent, #e94560, transparent);
    opacity: 0.3;
    top: 50%;
    transform: translateY(-300px);
  }
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 90px;
    text-align: center;
  }
  .tag {
    background: #e94560;
    color: white;
    font-size: 34px;
    font-weight: 900;
    padding: 14px 48px;
    border-radius: 60px;
    margin-bottom: 72px;
    letter-spacing: 3px;
  }
  .accent-bar {
    width: 100px;
    height: 8px;
    background: linear-gradient(90deg, #e94560, #ff6b6b);
    border-radius: 4px;
    margin-bottom: 64px;
  }
  .title {
    font-size: 92px;
    font-weight: 900;
    line-height: 1.25;
    word-break: break-all;
    text-shadow: 0 6px 24px rgba(0,0,0,0.6);
    margin-bottom: 56px;
  }
  .subtitle {
    font-size: 44px;
    color: rgba(255,255,255,0.65);
    line-height: 1.5;
    word-break: break-all;
  }
  .slide-num {
    position: absolute;
    bottom: 52px;
    right: 60px;
    font-size: 30px;
    color: rgba(255,255,255,0.35);
    z-index: 10;
  }
  .swipe-hint {
    position: absolute;
    bottom: 52px;
    left: 60px;
    font-size: 30px;
    color: rgba(255,255,255,0.35);
    z-index: 10;
  }
</style>
</head>
<body>
  <div class="deco-circle deco-1"></div>
  <div class="deco-circle deco-2"></div>
  <div class="deco-line"></div>
  <div class="content">
    <div class="tag">{{TAG}}</div>
    <div class="accent-bar"></div>
    <h1 class="title">{{TITLE}}</h1>
    <p class="subtitle">{{SUBTITLE}}</p>
  </div>
  <div class="swipe-hint">▶ スワイプして続きを見る</div>
  <div class="slide-num">1 / {{TOTAL}}</div>
</body>
</html>
