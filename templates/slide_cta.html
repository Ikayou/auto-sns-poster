<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'NotoSansJP';
    src: url('data:font/truetype;base64,{{FONT_B64}}') format('truetype');
    font-weight: 900;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    background: linear-gradient(160deg, #c0392b 0%, #e94560 50%, #ff6b6b 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'NotoSansJP', 'Noto Sans JP', sans-serif;
    color: white;
    overflow: hidden;
    position: relative;
    text-align: center;
    padding: 100px 80px;
  }
  .deco-circle {
    position: absolute;
    border-radius: 50%;
    background: white;
  }
  .deco-1 { width: 800px; height: 800px; top: -350px; right: -350px; opacity: 0.08; }
  .deco-2 { width: 550px; height: 550px; bottom: -200px; left: -200px; opacity: 0.07; }
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  .emoji {
    font-size: 160px;
    line-height: 1;
    margin-bottom: 60px;
  }
  .cta-text {
    font-size: 76px;
    font-weight: 900;
    line-height: 1.4;
    margin-bottom: 80px;
    word-break: break-all;
  }
  .account-badge {
    font-size: 46px;
    background: rgba(255,255,255,0.2);
    padding: 22px 64px;
    border-radius: 70px;
    margin-bottom: 52px;
    backdrop-filter: blur(4px);
  }
  .follow-btn {
    font-size: 48px;
    font-weight: 900;
    background: white;
    color: #e94560;
    padding: 28px 100px;
    border-radius: 70px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .slide-num {
    position: absolute;
    bottom: 52px;
    right: 60px;
    font-size: 30px;
    color: rgba(255,255,255,0.45);
    z-index: 10;
  }
</style>
</head>
<body>
  <div class="deco-circle deco-1"></div>
  <div class="deco-circle deco-2"></div>
  <div class="content">
    <div class="emoji">👇</div>
    <div class="cta-text">{{CTA_TEXT}}</div>
    <div class="account-badge">@{{ACCOUNT_NAME}}</div>
    <div class="follow-btn">フォローする</div>
  </div>
  <div class="slide-num">{{CURRENT}} / {{TOTAL}}</div>
</body>
</html>
