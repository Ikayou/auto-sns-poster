<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'NotoSansJP';
    src: url('data:font/truetype;base64,{{FONT_B64}}') format('truetype');
    font-weight: 900;
  }
  :root {
    --cream: #f3ede1;
    --cream-2: #ebe2cf;
    --ink: #14202e;
    --ink-soft: #2b3a4d;
    --coral: #d8513a;
    --olive: #5e6b3a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1350px;
    background: var(--cream);
    font-family: 'NotoSansJP', 'Noto Sans JP', system-ui, sans-serif;
    color: var(--ink);
    overflow: hidden;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }
  .topbar {
    position: absolute;
    top: 36px;
    left: 48px;
    right: 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0;
    text-transform: uppercase;
    z-index: 4;
  }
  .src {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .dot {
    width: 14px;
    height: 14px;
    background: var(--coral);
    border-radius: 50%;
    display: inline-block;
  }
  .num-badge {
    position: absolute;
    top: 78px;
    left: 48px;
    font-family: Georgia, 'Times New Roman', serif;
    font-weight: 900;
    font-size: 150px;
    line-height: 0.85;
    letter-spacing: 0;
    z-index: 4;
  }
  .num-badge .small {
    font-size: 42px;
    vertical-align: super;
    margin-left: 6px;
    font-weight: 700;
  }
  .category {
    position: absolute;
    top: 96px;
    right: 48px;
    font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0;
    text-transform: uppercase;
    padding: 10px 18px;
    border: 2px solid currentColor;
    border-radius: 999px;
    z-index: 4;
  }
  .visual-zone {
    position: absolute;
    top: 250px;
    left: 0;
    right: 0;
    height: 430px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 78px;
  }
  .image-card {
    width: 100%;
    height: 405px;
    background:
      linear-gradient(180deg, rgba(20,32,46,0.05), rgba(20,32,46,0.22)),
      url('{{IMAGE_DATA_URI}}');
    background-size: cover;
    background-position: center;
    border: 4px solid var(--ink);
    box-shadow: 22px 22px 0 var(--coral);
    transform: rotate(-2deg);
    position: relative;
    overflow: hidden;
  }
  .image-card::after {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 1;
    background:
      linear-gradient(135deg, transparent 0%, transparent 46%, rgba(216,81,58,0.58) 46%, rgba(216,81,58,0.58) 52%, transparent 52%),
      radial-gradient(circle at 12% 20%, rgba(243,237,225,0.34), transparent 22%);
    opacity: 0.58;
  }
  .no-image-mark {
    position: absolute;
    inset: 0;
    z-index: 2;
    display: {{NO_IMAGE_DISPLAY}};
    align-items: center;
    justify-content: center;
    background: var(--ink);
    color: var(--cream);
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 260px;
    font-weight: 900;
    letter-spacing: 0;
  }
  .content {
    position: absolute;
    left: 48px;
    right: 48px;
    bottom: 124px;
  }
  .kicker {
    font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0;
    text-transform: uppercase;
    margin-bottom: 14px;
    opacity: 0.72;
  }
  .headline {
    font-family: Georgia, 'Times New Roman', 'NotoSansJP', serif;
    font-weight: 900;
    font-size: 62px;
    line-height: 1.05;
    letter-spacing: 0;
    margin: 0 0 18px;
    overflow-wrap: anywhere;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .desc {
    font-size: 26px;
    line-height: 1.42;
    font-weight: 700;
    margin: 0 0 30px;
    max-width: 930px;
    color: var(--ink-soft);
    overflow-wrap: anywhere;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .points {
    display: grid;
    grid-template-columns: 1fr;
    gap: 13px;
    max-width: 930px;
  }
  .point {
    display: grid;
    grid-template-columns: 44px 1fr;
    gap: 15px;
    align-items: start;
  }
  .point-num {
    width: 38px;
    height: 38px;
    margin-top: 1px;
    background: var(--coral);
    color: var(--cream);
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    font-size: 22px;
    font-weight: 700;
  }
  .point-text {
    font-size: 23px;
    line-height: 1.38;
    font-weight: 700;
    color: var(--ink);
    overflow-wrap: anywhere;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .footer-bar {
    position: absolute;
    bottom: 40px;
    left: 48px;
    right: 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0;
    text-transform: uppercase;
    padding-top: 16px;
    border-top: 2px solid currentColor;
  }
  body::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top, rgba(255,255,255,0.22) 0%, transparent 60%);
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="src"><span class="dot"></span>heise.de</div>
    <div>{{DATE}}</div>
  </div>

  <div class="num-badge">{{CURRENT_PAD}}<span class="small">/{{TOTAL_PAD}}</span></div>
  <div class="category">{{TAG}}</div>

  <div class="visual-zone">
    <div class="image-card">
      <div class="no-image-mark">h</div>
    </div>
  </div>

  <div class="content">
    <div class="kicker">{{KICKER}}</div>
    <h1 class="headline">{{TITLE}}</h1>
    <p class="desc">{{SUMMARY}}</p>
    <div class="points">
      <div class="point">
        <div class="point-num">1</div>
        <div class="point-text">{{POINT_1}}</div>
      </div>
      <div class="point">
        <div class="point-num">2</div>
        <div class="point-text">{{POINT_2}}</div>
      </div>
      <div class="point">
        <div class="point-num">3</div>
        <div class="point-text">{{POINT_3}}</div>
      </div>
    </div>
  </div>

  <div class="footer-bar">
    <span>Quelle / heise.de</span>
    <span>@{{ACCOUNT_NAME}}</span>
  </div>
</body>
</html>
