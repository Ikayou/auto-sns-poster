<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'NotoSansJP';
    src: url('data:font/truetype;base64,{{FONT_B64}}') format('truetype');
    font-weight: 900;
  }
  :root {
    --cream: #f3ede1;
    --ink: #14202e;
    --coral: #d8513a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1350px;
    background: var(--cream);
    color: var(--ink);
    font-family: 'NotoSansJP', 'Noto Sans JP', system-ui, sans-serif;
    overflow: hidden;
    position: relative;
    text-align: center;
    -webkit-font-smoothing: antialiased;
  }
  .center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 80px;
  }
  .kick {
    font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    font-size: 30px;
    letter-spacing: 0;
    text-transform: uppercase;
    color: var(--coral);
    font-weight: 700;
    margin-bottom: 40px;
  }
  h2 {
    font-family: Georgia, 'Times New Roman', 'NotoSansJP', serif;
    font-weight: 900;
    font-size: 100px;
    line-height: 0.98;
    letter-spacing: 0;
    margin: 0 0 36px;
    overflow-wrap: anywhere;
  }
  .question {
    font-size: 30px;
    line-height: 1.45;
    font-weight: 700;
    max-width: 820px;
    margin-bottom: 44px;
    color: #2b3a4d;
  }
  .link-pill {
    display: inline-flex;
    align-items: center;
    gap: 16px;
    background: var(--ink);
    color: var(--cream);
    padding: 24px 40px;
    border-radius: 999px;
    font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 0;
  }
  .dot {
    width: 14px;
    height: 14px;
    background: var(--coral);
    border-radius: 50%;
  }
  body::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top, rgba(255,255,255,0.2) 0%, transparent 60%);
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="center">
    <div class="kick">Das war's fuer heute.</div>
    <h2>Welche News<br>ueberrascht dich<br>am meisten?</h2>
    <div class="question">Schreib es in die Kommentare.<br>Folge fuer den taeglichen Nachrichten-Digest.</div>
    <div class="link-pill">
      <span class="dot"></span>
      <span>@{{ACCOUNT_NAME}}</span>
    </div>
  </div>
</body>
</html>
