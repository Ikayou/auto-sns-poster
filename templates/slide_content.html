<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'NotoSansJP';
    src: url('data:font/truetype;base64,{{FONT_B64}}') format('truetype');
    font-weight: 900;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    background: linear-gradient(160deg, #1a1a2e 0%, #16213e 55%, #0f3460 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    font-family: 'NotoSansJP', 'Noto Sans JP', sans-serif;
    color: white;
    overflow: hidden;
    position: relative;
    padding: 120px 90px;
  }
  .deco-index {
    position: absolute;
    top: 48px;
    right: 64px;
    font-size: 200px;
    font-weight: 900;
    color: rgba(233, 69, 96, 0.1);
    line-height: 1;
    z-index: 0;
  }
  .deco-circle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.04;
    background: white;
  }
  .deco-1 { width: 600px; height: 600px; bottom: -180px; right: -180px; }
  .content {
    position: relative;
    z-index: 10;
  }
  .point-label {
    display: inline-flex;
    align-items: center;
    gap: 16px;
    background: #e94560;
    color: white;
    font-size: 32px;
    font-weight: 900;
    padding: 12px 36px;
    border-radius: 60px;
    margin-bottom: 56px;
    letter-spacing: 2px;
  }
  .heading {
    font-size: 76px;
    font-weight: 900;
    line-height: 1.3;
    margin-bottom: 52px;
    word-break: break-all;
  }
  .divider {
    width: 72px;
    height: 7px;
    background: linear-gradient(90deg, #e94560, #ff6b6b);
    border-radius: 4px;
    margin-bottom: 56px;
  }
  .body-text {
    font-size: 52px;
    line-height: 1.9;
    color: rgba(255,255,255,0.82);
    word-break: break-all;
  }
  .slide-num {
    position: absolute;
    bottom: 52px;
    right: 60px;
    font-size: 30px;
    color: rgba(255,255,255,0.35);
    z-index: 10;
  }
</style>
</head>
<body>
  <div class="deco-index">{{INDEX}}</div>
  <div class="deco-circle deco-1"></div>
  <div class="content">
    <div class="point-label">POINT {{INDEX}}</div>
    <h2 class="heading">{{HEADING}}</h2>
    <div class="divider"></div>
    <p class="body-text">{{BODY}}</p>
  </div>
  <div class="slide-num">{{CURRENT}} / {{TOTAL}}</div>
</body>
</html>
