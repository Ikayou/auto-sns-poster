<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'NotoSansJP';
    src: url('data:font/truetype;base64,{{FONT_B64}}') format('truetype');
    font-weight: 900;
  }
  :root {
    --cream: #f3ede1;
    --ink: #14202e;
    --coral: #d8513a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1350px;
    background: var(--ink);
    color: var(--cream);
    font-family: 'NotoSansJP', 'Noto Sans JP', system-ui, sans-serif;
    overflow: hidden;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }
  .big {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 0 80px;
  }
  .lead {
    font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    font-size: 28px;
    letter-spacing: 0;
    color: var(--coral);
    text-transform: uppercase;
    margin-bottom: 30px;
    font-weight: 700;
  }
  h1 {
    font-family: Georgia, 'Times New Roman', 'NotoSansJP', serif;
    font-weight: 900;
    font-size: 170px;
    line-height: 0.88;
    letter-spacing: 0;
    margin: 0;
  }
  .accent { color: var(--coral); }
  .sub {
    font-size: 30px;
    font-weight: 700;
    margin-top: 36px;
    line-height: 1.35;
    max-width: 820px;
    color: var(--cream);
    opacity: 0.85;
  }
  .swipe {
    position: absolute;
    bottom: 60px;
    left: 80px;
    right: 80px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    font-size: 24px;
    letter-spacing: 0;
    text-transform: uppercase;
    color: var(--cream);
    opacity: 0.75;
  }
  .arrow {
    font-size: 40px;
  }
  body::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top, rgba(255,255,255,0.06) 0%, transparent 60%);
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="big">
    <div class="lead">heise.de / {{DATE}}</div>
    <h1>Top<br><span class="accent">5</span><br>heute.</h1>
    <div class="sub">Die wichtigsten Tech-News von heise.de - kurz, klar, in fuenf Karten.</div>
  </div>
  <div class="swipe">
    <span>Swipe</span>
    <span class="arrow">→</span>
  </div>
</body>
</html>
